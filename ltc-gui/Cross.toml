[target.i686-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture i386 && apt-get update && apt-get install -y libasound2-dev:i386 pkg-config"
]

[target.i686-unknown-linux-musl]
pre-build = [
    "dpkg --add-architecture i386 && apt-get update && apt-get install -y libasound2-dev:i386 pkg-config musl-tools musl-dev"
]
